<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imprimir aguas {{ print_date|date:"d/m/Y" }}</title>
    <style>
        @page {
            size: 72mm 72mm;
            margin: 0;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            color: #000;
            font-family: "Aptos Narrow", Arial, sans-serif;
        }

        .print-toolbar {
            display: flex;
            gap: 8px;
            width: 72mm;
            margin: 0 auto 10px;
        }

        .print-toolbar button,
        .print-toolbar a {
            border: 0;
            border-radius: 6px;
            min-height: 36px;
            padding: 8px 10px;
            color: #fff;
            background: #ed1c24;
            font: 700 14px Arial, sans-serif;
            text-decoration: none;
            cursor: pointer;
        }

        .print-toolbar a {
            display: inline-flex;
            align-items: center;
            background: #16a65f;
        }

        .aguas-sheet {
            width: 72mm;
            height: 72mm;
            margin: 0 auto;
            background: #fff;
        }

        .aguas-table {
            width: 72mm;
            height: 72mm;
            table-layout: fixed;
            border-collapse: collapse;
            border-spacing: 0;
        }

        .aguas-table,
        .aguas-table * {
            box-sizing: border-box;
        }

        .aguas-table col.label {
            width: 16mm;
        }

        .aguas-table col.branch,
        .aguas-table col.blank {
            width: 14mm;
        }

        .aguas-table th,
        .aguas-table td {
            height: calc(72mm / 7);
            padding: 0;
            border: 0.35mm solid #000;
            color: #000;
            font-size: 16pt;
            font-weight: 400;
            line-height: 1;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        @media screen {
            body {
                min-height: 100vh;
                padding: 16px;
                background: #f3f4f6;
            }

            .aguas-sheet {
                box-shadow: 0 12px 34px rgba(0, 0, 0, 0.16);
            }
        }

        @media print {
            html,
            body {
                width: 72mm;
                height: 72mm;
                min-width: 72mm;
                min-height: 72mm;
                background: #fff;
            }

            .print-toolbar {
                display: none;
            }

            .aguas-sheet {
                margin: 0;
                box-shadow: none;
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <nav class="print-toolbar" aria-label="Acciones de impresion">
        <button type="button" onclick="window.print()">Imprimir</button>
        <a href="{% url 'admin_dashboard' %}">Volver</a>
    </nav>

    <main class="aguas-sheet" aria-label="Resumen imprimible de aguas">
        <table class="aguas-table">
            <colgroup>
                <col class="label">
                <col class="branch">
                <col class="branch">
                <col class="branch">
                <col class="blank">
            </colgroup>
            <tbody>
                <tr>
                    <th></th>
                    {% for branch in branches %}
                    <th>{{ branch }}</th>
                    {% endfor %}
                    <th>=</th>
                </tr>
                {% for row in rows %}
                <tr>
                    <td>{{ row.label }}</td>
                    {% for value in row.values %}
                    <td>{{ value }}</td>
                    {% endfor %}
                    <td></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>

    <script>
        window.addEventListener("load", () => {
            window.setTimeout(() => window.print(), 350);
        });
    </script>
</body>
</html>
