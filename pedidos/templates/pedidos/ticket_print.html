<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imprimir pedido #{{ pedido.id }}</title>
    <style>
        @page {
            size: {{ ticket_width_mm }}mm {{ ticket_height_mm }}mm;
            margin: 0;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            color: #000;
            font-family: Calibri, Arial, sans-serif;
        }

        .print-toolbar {
            display: flex;
            gap: 8px;
            width: {{ ticket_width_mm }}mm;
            margin: 0 auto 10px;
        }

        .print-toolbar button,
        .print-toolbar a {
            border: 0;
            border-radius: 6px;
            min-height: 36px;
            padding: 8px 10px;
            color: #fff;
            background: #ed1c24;
            font: 700 14px Arial, sans-serif;
            text-decoration: none;
            cursor: pointer;
        }

        .print-toolbar a {
            display: inline-flex;
            align-items: center;
            background: #16a65f;
        }

        .ticket-sheet {
            width: {{ ticket_width_mm }}mm;
            margin: 0 auto;
            background: #fff;
        }

        .ticket-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            border-spacing: 0;
        }

        .ticket-table col.product {
            width: {{ column_widths_mm.product }}mm;
        }

        .ticket-table col.quantity {
            width: {{ column_widths_mm.quantity }}mm;
        }

        .ticket-table col.blank {
            width: {{ column_widths_mm.blank }}mm;
        }

        .ticket-title {
            height: {{ header_height_mm }}mm;
            padding: 0;
            border: 0;
            font-size: 16pt;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        .ticket-date-row td {
            height: {{ date_height_mm }}mm;
            padding: 0;
            border: 0;
        }

        .ticket-date-row .date-cell {
            border: 1px solid #000;
            font-size: 11pt;
            font-weight: 700;
            line-height: 1;
            text-align: center;
            vertical-align: middle;
        }

        .ticket-item-row td {
            height: var(--row-height);
            padding: 0;
            border: 1px solid #000;
            line-height: 1;
            vertical-align: middle;
        }

        .ticket-product {
            padding-left: 1mm !important;
            font-size: 10pt;
            font-weight: 700;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
        }

        .ticket-quantity {
            padding: 0 0.5mm !important;
            font-size: 9pt;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }

        @media screen {
            body {
                min-height: 100vh;
                padding: 16px;
                background: #f3f4f6;
            }

            .ticket-sheet {
                box-shadow: 0 12px 34px rgba(0, 0, 0, 0.16);
            }
        }

        @media print {
            html,
            body {
                width: {{ ticket_width_mm }}mm;
                min-width: {{ ticket_width_mm }}mm;
                background: #fff;
            }

            .print-toolbar {
                display: none;
            }

            .ticket-sheet {
                margin: 0;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <nav class="print-toolbar" aria-label="Acciones de impresion">
        <button type="button" onclick="window.print()">Imprimir</button>
        <a href="{% url 'admin_dashboard' %}">Volver</a>
    </nav>

    <main class="ticket-sheet" aria-label="Pedido imprimible">
        <table class="ticket-table">
            <colgroup>
                <col class="product">
                <col class="quantity">
                <col class="blank">
            </colgroup>
            <tbody>
                <tr>
                    <td class="ticket-title" colspan="3">{{ title }}</td>
                </tr>
                <tr class="ticket-date-row">
                    <td></td>
                    <td></td>
                    <td class="date-cell">{{ date_display }}</td>
                </tr>
                {% for row in rows %}
                <tr class="ticket-item-row" style="--row-height: {{ row.height_mm }}mm;">
                    <td class="ticket-product">{{ row.producto }}</td>
                    <td class="ticket-quantity">{{ row.cantidad }}</td>
                    <td></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>

    <script>
        window.addEventListener("load", () => {
            window.setTimeout(() => window.print(), 350);
        });
    </script>
</body>
</html>
